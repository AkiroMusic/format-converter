name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npx electron-vite build
      - run: npx electron-builder --win --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/
          retention-days: 1
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npx electron-vite build
      - run: npx electron-builder --mac --arm64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/
          retention-days: 1
          if-no-files-found: error
      - name: Upload DMG to Release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.2 release/*.dmg --clobber
          gh release upload v1.0.2 release/*.dmg.blockmap --clobber || true
          gh release upload v1.0.2 release/latest-mac.yml --clobber || true

  release:
    needs: [build-win, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
            *.blockmap
            *.yml
          generate_release_notes: true
